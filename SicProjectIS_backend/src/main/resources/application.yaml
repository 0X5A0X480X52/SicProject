spring:
  application:
    name: SicProjectIS_backend
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/research_project_management?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:ZHRhenry20050305}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never
      schema-locations: classpath:db/migration/R__authorization_admin_tables.sql,classpath:db/migration/R__structured_v2_tables.sql

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.amatrix.sicprojectis_backend
  configuration:
    map-underscore-to-camel-case: true

app:
  file-storage:
    provider: ${FILE_STORAGE_PROVIDER:local}
    local-root: ${FILE_STORAGE_LOCAL_ROOT:${user.dir}/uploads}
    public-url-prefix: ${FILE_STORAGE_PUBLIC_URL_PREFIX:/api/material-versions}
  security:
    jwt-secret: ${JWT_SECRET:change-this-development-secret-to-at-least-32-bytes}
    jwt-expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
  bootstrap-admin:
    enabled: ${BOOTSTRAP_ADMIN_ENABLED:true}
    username: ${BOOTSTRAP_ADMIN_USERNAME:admin}
    password: ${BOOTSTRAP_ADMIN_PASSWORD:Admin123456}
    real-name: ${BOOTSTRAP_ADMIN_REAL_NAME:System Administrator}
