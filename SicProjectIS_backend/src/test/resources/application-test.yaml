spring:
  datasource:
    url: jdbc:h2:mem:sic_project_is;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql
      data-locations: classpath:data-h2.sql

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.amatrix.sicprojectis_backend
  configuration:
    map-underscore-to-camel-case: true

app:
  file-storage:
    provider: local
    local-root: ${user.dir}/target/test-uploads
    public-url-prefix: /api/material-versions
  security:
    jwt-secret: test-secret-key-with-more-than-thirty-two-bytes
    jwt-expiration-minutes: 120
  bootstrap-admin:
    enabled: true
    username: bootstrap_admin
    password: Bootstrap123456
    real-name: Bootstrap Admin
