spring:
  datasource:
    url: jdbc:h2:mem:sic_project_is;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql
      data-locations: classpath:data-h2.sql

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.amatrix.sicprojectis_backend.entity
  configuration:
    map-underscore-to-camel-case: true
